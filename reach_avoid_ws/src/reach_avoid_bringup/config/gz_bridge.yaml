# ros_gz_bridge config for reach_avoid_arena (Gazebo Harmonic)
# PX4 spawns models as x500_1 (defender), x500_2 (attacker)
- ros_topic_name: "/clock"
  gz_topic_name: "/clock"
  ros_type_name: "rosgraph_msgs/msg/Clock"
  gz_type_name: "gz.msgs.Clock"
  direction: GZ_TO_ROS

# Gazebo Harmonic publishes all poses in /world/<world>/pose/info as Pose_V.
# Bridge the full pose array to ROS, then ground_truth_relay picks out x500_1/x500_2.
- ros_topic_name: "/gz/pose_info"
  gz_topic_name: "/world/reach_avoid_arena/pose/info"
  ros_type_name: "tf2_msgs/msg/TFMessage"
  gz_type_name: "gz.msgs.Pose_V"
  direction: GZ_TO_ROS
