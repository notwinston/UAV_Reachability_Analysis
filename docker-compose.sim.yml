# docker-compose.sim.yml - Simulation environment for reach-avoid drone game
#
# Usage:
#   docker-compose -f docker-compose.sim.yml up
#
# For NVIDIA GPU support, uncomment the runtime and deploy sections below.
# For macOS, install XQuartz and run: xhost +localhost

services:
  reach-avoid-sim:
    build:
      context: .
      dockerfile: Dockerfile.sim
    image: reach-avoid-sim:latest
    container_name: reach-avoid-sim
    network_mode: host
    environment:
      - ROS_DOMAIN_ID=0
      - PX4_SIM_MODEL=gz_x500
      - PX4_GZ_WORLD=reach_avoid_arena
      # Uncomment for X11 GUI (requires XQuartz on Mac or X11 on Linux):
      # - DISPLAY=${DISPLAY}
      # - QT_X11_NO_MITSHM=1
    volumes:
      - /tmp/.X11-unix:/tmp/.X11-unix:rw
      - ./data/value_functions:/home/simuser/ws/data/value_functions:ro
      - ./config:/home/simuser/ws/config:ro
    # Uncomment for NVIDIA GPU machines:
    # runtime: nvidia
    # deploy:
    #   resources:
    #     reservations:
    #       devices:
    #         - driver: nvidia
    #           count: all
    #           capabilities: [gpu]
    command: ros2 launch reach_avoid_bringup full_game.launch.py
